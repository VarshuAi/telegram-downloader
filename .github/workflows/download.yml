name: Telegram to Google Drive Downloader

on:
  # Allows you to manually trigger this from the GitHub Actions tab
  workflow_dispatch:
  
  # Auto-runs every 6 hours — keeps downloading until ALL files are done
  schedule:
    - cron: '0 */6 * * *'

concurrency:
  group: telegram-session-concurrency
  cancel-in-progress: false

jobs:
  download-and-upload:
    runs-on: ubuntu-latest
    timeout-minutes: 360  # 6 hours maximum runtime

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install telethon cryptg google-auth google-auth-oauthlib google-auth-httplib2 google-api-python-client

      - name: Run Telegram -> GDrive downloader
        env:
          TELEGRAM_API_ID: ${{ secrets.TELEGRAM_API_ID }}
          TELEGRAM_API_HASH: ${{ secrets.TELEGRAM_API_HASH }}
          TELEGRAM_SESSION_STRING: ${{ secrets.TELEGRAM_SESSION_STRING }}
          TELEGRAM_CHANNEL_SOURCE: ${{ secrets.TELEGRAM_CHANNEL_SOURCE }}
          GDRIVE_FOLDER_ID: ${{ secrets.GDRIVE_FOLDER_ID }}
          GDRIVE_CLIENT_ID: ${{ secrets.GDRIVE_CLIENT_ID }}
          GDRIVE_CLIENT_SECRET: ${{ secrets.GDRIVE_CLIENT_SECRET }}
          GDRIVE_REFRESH_TOKEN: ${{ secrets.GDRIVE_REFRESH_TOKEN }}
        run: python -u github_actions_downloader.py
